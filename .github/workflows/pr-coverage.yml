name: Test Coverage Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    
    # Required permissions to post a comment on the PR
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          # Install the local package in editable mode
          pip install -e . 
          
      - name: Run Tests and Generate Coverage Report
        # This command runs tests, calculates coverage for the src folder, 
        # formats missing lines, and saves the output to a text file.
        run: |
          pytest --junitxml=pytest.xml --cov-report=term-missing:skip-covered --cov=src/numanalysislib tests/ | tee pytest-coverage.txt

      - name: Post PR Coverage Comment
        uses: MishaKav/pytest-coverage-comment@main
        with:
          # This action reads the text file and generates a beautiful markdown table
          pytest-coverage-path: ./pytest-coverage.txt
          junitxml-path: ./pytest.xml
          # Fails the PR check if coverage falls below a certain percentage
          coverage-path-prefix: src/numanalysislib/
          hide-badge: false
          hide-report: false
          create-new-comment: false
          title: "Test Coverage Report"
          badge-title: "Coverage"
